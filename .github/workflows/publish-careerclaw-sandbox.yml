name: Publish CareerClaw Sandbox Image (GHCR)

on:
  workflow_dispatch:
    inputs:
      careerclaw_version:
        description: "CareerClaw PyPI version to bake into the sandbox image"
        required: true
        default: "0.7.2"
      image_tag_suffix:
        description: "Optional extra tag suffix (e.g., rc1). Leave blank for none."
        required: false
        default: ""
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openclaw-sandbox

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version and tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          # Version source:
          # - workflow_dispatch: from input
          # - tag push: strip leading 'v' from tag name
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.careerclaw_version }}"
            SUFFIX="${{ inputs.image_tag_suffix }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            SUFFIX=""
          fi

          # Validate semver-ish (basic)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi

          # Optional suffix handling
          if [[ -n "$SUFFIX" ]]; then
            TAG_VERSION="careerclaw-${VERSION}-${SUFFIX}"
          else
            TAG_VERSION="careerclaw-${VERSION}"
          fi

          echo "careerclaw_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_latest=careerclaw-latest" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.sandbox.careerclaw
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            CAREERCLAW_VERSION=${{ steps.meta.outputs.careerclaw_version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
